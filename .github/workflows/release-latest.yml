name: Release (latest)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate
        run: python3 validate_skill.py .

      - name: Package skill
        run: make package

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from `main` branch.

            Install into your agent runtime's skills directory (e.g.
            `~/.claude/skills` for Claude Code, `~/.openclaw/workspace/skills`
            for OpenClaw):
            ```bash
            SKILLS_DIR=~/.claude/skills   # adjust for your runtime
            mkdir -p "$SKILLS_DIR/tabstack"
            unzip tabstack.skill -d "$SKILLS_DIR/tabstack/"
            ```
            Then set your `TABSTACK_API_KEY` (see the skill's Setup section).
          prerelease: true
          make_latest: false
          files: tabstack.skill

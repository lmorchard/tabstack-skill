name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate skill structure
        run: python3 validate_skill.py .

      - name: Install dependencies
        run: npm install

      - name: Check TypeScript compiles
        run: npx tsx --version && npx tsx scripts/tabstack.ts --help || true
